<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авто Каталог</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f8f8;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .car-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            text-align: center;
            width: 100%;
            min-height: 400px;
        }
        .car-card:hover {
            transform: translateY(-5px);
        }
        .car-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .car-info, .car-history {
            padding: 15px;
            transition: opacity 0.5s ease-in-out;
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            min-height: 100px;
        }
        .car-history {
            opacity: 0;
            visibility: hidden;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>

            const container = document.querySelector('.container');

            cars.forEach(car => {
                const carCard = document.createElement('div');
                carCard.className = 'car-card';
                carCard.innerHTML = `
                    <img src="${car.image}" alt="${car.name}">
                    <div class="car-info">
                        <h2>${car.name}</h2>
                        <p>Год: ${car.year}</p>
                        <p>Мощность: ${car.power}</p>
                        <p>Цена: ${car.price}</p>
                    </div>
                    <div class="car-history">${car.history}</div>
                `;
                carCard.addEventListener('click', () => {
                    const info = carCard.querySelector('.car-info');
                    const history = carCard.querySelector('.car-history');
                    if (history.style.opacity === '0' || history.style.opacity === '') {
                        info.style.opacity = '0';
                        info.style.visibility = 'hidden';
                        history.style.opacity = '1';
                        history.style.visibility = 'visible';
                    } else {
                        info.style.opacity = '1';
                        info.style.visibility = 'visible';
                        history.style.opacity = '0';
                        history.style.visibility = 'hidden';
                    }
                });
                container.appendChild(carCard);
            });
        });
    </script>
